<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Anlık Hava Durumu - Meteoroloji</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: #f3f4f6; color: #1f2937; font-family: sans-serif; padding: 15px; height: 100dvh; width: 100vw; overflow: hidden; user-select: none; position: relative; }

/* MASUM HAVA DURUMU EKRANI */
.fake-container { max-width: 450px; margin: 50px auto 0 auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e5e7eb; position: relative; z-index: 10; }
.fake-title { font-size: 20px; font-weight: bold; color: #1e3a8a; margin-bottom: 20px; }
.weather-info { font-size: 48px; margin: 15px 0; color: #3b82f6; cursor: pointer; transition: transform 0.1s; }
.weather-info:active { transform: scale(0.95); }
.weather-details { display: flex; justify-content: space-around; margin: 20px 0; font-size: 14px; color: #4b5563; }
.fake-input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; text-align: center; transition: all 0.2s; }
.fake-input:focus { border-color: #3b82f6; }
.settings-btn { background: none; border: none; color: #9ca3af; font-size: 11px; cursor: pointer; margin-top: 15px; text-decoration: underline; }

/* SİBER GİZLİ TÜNEL EKRANI */
.cyber-body { background-color: #000000 !important; color: #22c55e !important; font-family: monospace !important; padding: 10px !important; }
.ghost-main-frame { border: 2px solid #22c55e; height: 100%; width: 100%; max-width: 1000px; margin: 0 auto; padding: 12px; position: relative; display: flex; flex-direction: column; background-color: #000000; box-shadow: inset 0 0 20px rgba(34, 197, 94, 0.15); }
.screen-container { position: absolute; left: 0; top: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 40; padding: 12px; }
</style>
<style>
.auth-box-clean { width: 90%; max-width: 400px; border: 2px solid #22c55e; padding: 25px; background: #000000; position: relative; margin-top: 110px; }
.auth-title { text-align: center; font-size: 14px; letter-spacing: 4px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid rgba(34, 197, 94, 0.3); padding-bottom: 10px; }
label { display: block; font-size: 11px; text-transform: uppercase; color: #16a34a; font-weight: bold; }
.cyber-input { background-color: #000000; border: 2px solid #22c55e; padding: 10px; color: #4ade80; font-family: monospace; font-size: 15px; width: 100%; outline: none; margin-bottom: 15px; }
.btn-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(34, 197, 94, 0.3); }
.action-btn { flex: 1; min-width: 85px; background: none; border: 2px solid #22c55e; padding: 10px 4px; color: #22c55e; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: bold; }
#messages { overflow-y: auto; padding: 10px; flex: 1; min-height: 0; margin-bottom: 5px; }

@keyframes flyToCenterCloud {
0% { transform: translate(0, 0) scale(1); opacity: 1; }
100% { transform: translate(var(--target-x), var(--target-y)) scale(0.3); opacity: 0; }
}
@keyframes rainFallAnimation {
0% { transform: translateY(0); opacity: 0; }
20% { opacity: 1; }
85% { opacity: 1; }
100% { transform: translateY(135px); opacity: 0; }
}
@keyframes destructionRain {
0% { transform: translateY(0); opacity: 0.9; }
100% { transform: translateY(650px); opacity: 0; }
}
@keyframes cloudLightning {
0%, 90%, 100% { border-color: #0055ff; }
3%, 7% { border-color: #ffffff; }
}
.fly-animation { display: inline-block; animation: flyToCenterCloud 2.4s forwards ease-in-out; }
.intro-drop { position: absolute; color: #00a8cc; font-size: 18px; font-weight: bold; animation: rainFallAnimation 1.1s linear infinite !important; pointer-events: none; z-index: 999; display: block !important; }
.destruction-drop { position: absolute; color: #00a8cc; font-size: 14px; animation: destructionRain 1.3s linear forwards; pointer-events: none; }
.theme-cloud-active { animation: cloudLightning 4s ease-in-out infinite; }
.hidden { display: none !important; }

#orientation-lock { position: fixed; inset: 0; background: #000; color: #ef4444; z-index: 99999; text-align: center; font-family: monospace; font-weight: bold; padding: 40px; display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 16px; border: 4px solid #ef4444; }
@media screen and (orientation: landscape) and (max-width: 950px) and (pointer: coarse) { #orientation-lock { display: flex; } }
</style>
</head>

<p style="font-size: 32px; margin-bottom: 20px;">⚠️</p>
<p style="letter-spacing: 2px; text-transform: uppercase;">GÜVENLİK PROTOKOLÜ</p>
<p style="font-size: 12px; color: #6b7280; margin-top: 10px; letter-spacing: 1px;">LÜTFEN TELEFONUNUZU DİK KONUMA GETİRİN.</p>
</div>

<div id="fakeApp" class="fake-container">
    <div class="fake-title">☀️ Devlet Meteoroloji</div>
    <div id="secretTriggerNode" class="weather-info">☀️ 24°C</div>
    <p id="cityNameText" style="font-size:15px; color:#4b5563;">Ankara - Açık</p>

        <div id="humidityText">💧 Nem: %42</div>

    <div style="position: relative; display: flex; align-items: center; justify-content: center; width: 100%;">

    <br>
    <button type="button" id="settingsBtn" onclick="resetMyKey()" class="settings-btn">Ayarlar</button>
</div>
<div id="cyberApp" class="hidden" style="height:100%; width:100%;">
<div class="ghost-main-frame">
    <div style="display: flex; justify-content: center; width: 100%; position: absolute; top: 15px; z-index: 100; pointer-events: none;">
        <div id="cloudHeader" class="theme-cloud-active" style="position: relative; width: 140px; height: 50px; background: #000; border: 3px solid #0055ff; border-radius: 30px; display: flex; align-items: center; justify-content: center;">
            <div style="position: absolute; width: 55px; height: 55px; background: #000; border-top: 3px solid #0055ff; border-left: 3px solid #0055ff; border-radius: 50%; top: -28px; left: 15px;"></div>
            <div style="position: absolute; width: 70px; height: 70px; background: #000; border-top: 3px solid #0055ff; border-right: 3px solid #0055ff; border-radius: 50%; top: -40px; right: 20px;"></div>
            <span id="cloudIcon" style="font-size: 38px; color: #0055ff; position: relative; z-index: 110;">⚡</span>
            <div id="rainContainer" style="position: absolute; left: 50%; top: 75px; transform: translateX(-50%); width: 140px; height: 20px;"></div>
        </div>
    </div>
    
    <div id="screen1" class="screen-container">
        <div class="auth-box-clean">
            <div class="auth-title">GHOST AUTHENTICATION</div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="color: #16a34a; font-size: 11px;">KİMLİĞİNİZ (KİLİTLİ):</label>
                <div id="myNickDisplay" style="color: #4ade80; font-size: 18px; font-weight: bold; padding: 10px 0; border-bottom: 2px dashed rgba(34, 197, 94, 0.3); letter-spacing: 2px;">YÜKLENİYOR...</div>
            </div>
            <div>
                <label>BAĞLANILACAK HEDEF:</label>
                <input id="targetNumber" type="tel" placeholder="Hedef takma adı yazın..." class="cyber-input" style="margin-top: 5px;">
            </div>
            <div class="btn-grid">
                <button type="button" onclick="goToChat()" class="action-btn"><span>📞</span>Sesli</button>
                <button type="button" onclick="goToChat()" class="action-btn"><span>📷</span>Kamera</button>
                <button type="button" onclick="goToChat()" class="action-btn"><span>💬</span>Yazı</button>
            </div>
        </div>
    </div>
<script src="/socket.io/socket.io.js"></script>
<script>
// KESİN ÇÖZÜM: Boş soket yerine tarayıcıyı canlı sunucu adresinize doğrudan kilitledik
const socket = io(window.location.origin);
const configuration = { iceServers: [{ urls: 'stun:://google.com' }] };

let fakeApp, cyberApp, cityInput, secretTriggerNode;
let searchBtn, settingsBtn, screen1, screen2;
let messagesDiv, messageInput, rainContainer;
let cloudIcon, cloudHeader, videoPanel, videoRequestBtn;

let introRainInterval = null; let localStream = null;
let peerConnection = null; let isVideoActive = false;
let myNick = ""; let targetNick = "";
let isIncomingCallWaiting = false; let mySecretPass = "";
let totalRoomMessages = 0; let allowedCallSeconds = 120;
let callTimerInterval = null; let isPremiumUser = false;

window.onload = function() {
    fakeApp = document.getElementById('fakeApp');
    cyberApp = document.getElementById('cyberApp');
    cityInput = document.getElementById('cityInput');
    secretTriggerNode = document.getElementById('secretTriggerNode');

    settingsBtn = document.getElementById('settingsBtn');

    if (searchBtn) searchBtn.addEventListener('click', () => { performWeatherSearch(); });
    if (cityInput) cityInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { performWeatherSearch(); } });
    if (secretTriggerNode) secretTriggerNode.addEventListener('click', () => { handleSecretGateClick(); });

    mySecretPass = localStorage.getItem('ghost_key');
    myNick = localStorage.getItem('ghost_nick');

    if (!mySecretPass || !myNick) {
        let setupPass = "";

        }
        checkAndSetupNickname(setupPass.trim());

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const configuration = { iceServers: [{ urls: 'stun:://google.com' }] };

let fakeApp, cyberApp, cityInput, secretTriggerNode;
let searchBtn, settingsBtn, screen1, screen2;
let messagesDiv, messageInput, rainContainer;
let cloudIcon, cloudHeader, videoPanel, videoRequestBtn;

let introRainInterval = null; let localStream = null;
let peerConnection = null; let isVideoActive = false;
let myNick = ""; let targetNick = "";
let isIncomingCallWaiting = false; let mySecretPass = "";
let totalRoomMessages = 0; let allowedCallSeconds = 120;
let callTimerInterval = null; let isPremiumUser = false;

window.onload = function() {
    fakeApp = document.getElementById('fakeApp');
    cyberApp = document.getElementById('cyberApp');
    cityInput = document.getElementById('cityInput');
    secretTriggerNode = document.getElementById('secretTriggerNode');
    searchBtn = document.getElementById('searchBtn');
    settingsBtn = document.getElementById('settingsBtn');
    screen1 = document.getElementById('screen1');
    screen2 = document.getElementById('screen2');
    messagesDiv = document.getElementById('messages');
    messageInput = document.getElementById('messageInput');
    rainContainer = document.getElementById('rainContainer');
    cloudIcon = document.getElementById('cloudIcon');
    cloudHeader = document.getElementById('cloudHeader');
    videoPanel = document.getElementById('videoPanel');
    videoRequestBtn = document.getElementById('videoRequestBtn');

    if (searchBtn) searchBtn.addEventListener('click', () => { performWeatherSearch(); });
    if (cityInput) cityInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { performWeatherSearch(); } });
    if (secretTriggerNode) secretTriggerNode.addEventListener('click', () => { handleSecretGateClick(); });

    mySecretPass = localStorage.getItem('ghost_key');
    myNick = localStorage.getItem('ghost_nick');

    if (!mySecretPass || !myNick) {
        let setupPass = "";
        while (!setupPass || setupPass.trim().length < 3) {
            setupPass = prompt("Sisteme giriş şifrenizi belirleyin (En az 3 karakter):");
        }
        checkAndSetupNickname(setupPass.trim());
    } else {
        if (settingsBtn) settingsBtn.style.display = "none";
    }
};
function checkAndSetupNickname(savedPass) {
    let setupNick = prompt("Benzersiz takma adınızı (Nickname) belirleyin:");
    if (!setupNick || setupNick.trim().length < 3) {
        alert("Geçersiz isim! Tekrar deneyin."); checkAndSetupNickname(savedPass); return;
    }
    socket.emit('check-nickname-availability', setupNick.trim(), (response) => {
        if (response.available) {
            localStorage.setItem('ghost_key', savedPass);
            localStorage.setItem('ghost_nick', setupNick.trim());
            mySecretPass = savedPass; myNick = setupNick.trim();
            alert("Kimlik verileriniz cihaza kilitlendi!");
            if (settingsBtn) settingsBtn.style.display = "none";
        } else {
            alert("⚠️ Bu takma ad kapılmış! Farklı isim girin."); checkAndSetupNickname(savedPass);
        }
    });
}

function resetMyKey() {
    let check = prompt("Mevcut şifreniz:");
    if (check === mySecretPass) {
        let newKey = prompt("Yeni şifre:");
        if(newKey && newKey.trim().length >= 3) {
            localStorage.setItem('ghost_key', newKey.trim());
            mySecretPass = newKey.trim(); alert("Güncellendi!");
        }
    } else { alert("Yanlış!"); }
}

function performWeatherSearch() {
    let query = cityInput.value.trim(); if (!query) return;
    if (query === mySecretPass) { alert("Şehir bulunamadı. Tekrar deneyin."); return; }
    document.getElementById('cityNameText').innerText = query.toUpperCase() + " - Sağanak Yağışlı";
    let randomTemp = Math.floor(Math.random() * 15) + 10;
    secretTriggerNode.innerText = `☀️ ${randomTemp}°C`;
    document.getElementById('humidityText').innerText = "💧 Nem: %" + (Math.floor(Math.random() * 30) + 60);
    document.getElementById('windText').innerText = "💨 Rüzgar: " + (Math.floor(Math.random() * 20) + 10) + " km/s";
    cityInput.value = "";
}

function checkUserPremiumStatus() {
    let cacheStatus = localStorage.getItem('ghost_premium');
    if (cacheStatus === 'active') {
        isPremiumUser = true;
        document.getElementById('premiumStatusText').innerText = "PREMIUM HESAP (SINIRSIZ)";
        document.getElementById('premiumStatusText').style.color = "#4ade80";
        document.getElementById('liveCallTimerText').innerText = "SÜRE: SINIRSIZ";
        document.getElementById('liveMsgCounterText').innerText = "MESAJ: SINIRSIZ";
    }
}

let clickCount = 0; let clickTimeout = null;
function handleSecretGateClick() {
    clickCount++; if (clickTimeout) clearTimeout(clickTimeout);
    clickTimeout = setTimeout(() => { clickCount = 0; }, 500);
    if (clickCount === 3) {
        clickCount = 0; let val = cityInput.value.trim();
        if (val === mySecretPass) {
            cityInput.value = ""; fakeApp.classList.add('hidden'); cyberApp.classList.remove('hidden');
            document.body.className = 'cyber-body';
            document.getElementById('myNickDisplay').innerText = "@" + myNick.toUpperCase();
            socket.emit('register-ghost', myNick);
            startGlobalRain();
            if (isIncomingCallWaiting) {
                isIncomingCallWaiting = false;
                socket.emit('initiate-ghost-call', { sender: myNick, receiver: targetNick });
            }
        } else { performWeatherSearch(); }
    }
}

function startIntroRain() {
    if (introRainInterval) clearInterval(introRainInterval);
    introRainInterval = setInterval(() => {
        if (cyberApp.classList.contains('hidden')) return;
        const drop = document.createElement('div'); drop.innerText = '💧'; drop.className = 'intro-drop';
        drop.style.left = (Math.random() * 115) + "px"; drop.style.top = "45px";
        if (rainContainer) rainContainer.appendChild(drop);
        setTimeout(() => drop.remove(), 1050);
    }, 50);
}

function goToChat() {
    targetNick = document.getElementById('targetNumber').value.trim();
    if(!targetNick) { alert("Hedef adı girin!"); return; }
    if (introRainInterval) clearInterval(introRainInterval);
    if (rainContainer) rainContainer.innerHTML = "";
    socket.emit('initiate-ghost-call', { sender: myNick, receiver: targetNick });
}

socket.on('ghost-tunnel-ready', () => {
    screen1.classList.add('hidden'); screen2.classList.remove('hidden');
    messagesDiv.innerHTML = ""; appendSystemMessage("[Sistem]: Güvenli tünel hazır.");
    checkUserPremiumStatus(); if (!isPremiumUser) startDailyCallCountdown();
});

function startDailyCallCountdown() {
    if (callTimerInterval) clearInterval(callTimerInterval);
    callTimerInterval = setInterval(() => {
        allowedCallSeconds--;
        let minutes = Math.floor(allowedCallSeconds / 60); let seconds = allowedCallSeconds % 60;
        let formattedTime = (minutes < 10 ? "0" : "") + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
        document.getElementById('liveCallTimerText').innerText = "SÜRE: " + formattedTime;
        if (allowedCallSeconds <= 0) { clearInterval(callTimerInterval); triggerPremiumLockout("Süreniz doldu!"); }
    }, 1000);
}
document.getElementById('chatForm')
.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!isPremiumUser && totalRoomMessages >= 10) {
        triggerPremiumLockout("Mesaj limiti doldu!"); 
        return;
    }
    const txt = messageInput.value.trim(); 
    if (!txt) return;
    const msgId = "g" + Math.random()
    .toString(36).substr(2, 9);
    socket.emit('send-ghost-msg', 
    { id: msgId, text: txt });
    if (!isPremiumUser) {
        totalRoomMessages++;
        document.getElementById('liveMsgCounterText')
        .innerText = "TOPLAM ODADAKİ MESAJ: " + 
        totalRoomMessages + " / 10";
    }
    const html = `<div id="msg-${msgId}" 
    style="padding:6px; width:100%; text-align:left; 
    margin-bottom:20px;"><div style="display:inline; 
    font-size:18px; font-weight:bold; color:#4ade80;">
    <span id="text-${msgId}">${txt}</span>
    <span style="font-size:14px; color:#6b7280;" 
    id="timer-${msgId}">İletiliyor...</span></div></div>`;
    messagesDiv.insertAdjacentHTML('beforeend', html); 
    messagesDiv.scrollTop = messagesDiv.scrollHeight; 
    messageInput.value = "";
});

socket.on('receive-ghost-msg', (data) => {
    if (!isPremiumUser) {
        totalRoomMessages++;
        document.getElementById('liveMsgCounterText')
        .innerText = "TOPLAM ODADAKİ MESAJ: " + 
        totalRoomMessages + " / 10";
        if (totalRoomMessages > 10) { 
            triggerPremiumLockout("Mesaj limiti doldu!"); 
            return; 
        }
    }
    const html = `<div id="msg-${data.id}" 
    style="padding:6px; width:100%; text-align:left; 
    margin-bottom:20px;"><div style="display:inline; 
    font-size:18px; font-weight:bold; color:#4ade80;">
    <span id="text-${data.id}">${data.text}</span>
    <span style="font-size:14px; color:#ef4444;" 
    id="timer-${data.id}">30s</span></div></div>`;
    messagesDiv.insertAdjacentHTML('beforeend', html); 
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    socket.emit('msg-read-confirm', 
    { id: data.id, text: data.text }); 
    startCountdownTimer(data.id, data.text);
});

function createPeerConnection() {
    peerConnection = new 
    RTCPeerConnection(configuration);
    if (localStream) { 
        localStream.getTracks().forEach(track => 
        peerConnection.addTrack(track, localStream)); 
    }
    peerConnection.ontrack = (event) => { 
        if (event.streams && event.streams) { 
            document.getElementById('remoteVideo')
            .srcObject = event.streams; 
        } 
    };
    peerConnection.onicecandidate = (event) => { 
        if (event.candidate) 
            socket.emit('ghost-ice', event.candidate); 
    };
}

async function handleVideoToggle() {
    if (!isVideoActive) {
        try {
            localStream = await navigator
            .mediaDevices.getUserMedia(
            { video: true, audio: true });
            videoPanel.classList.remove('hidden'); 
            document.getElementById('localVideo')
            .srcObject = localStream;
            createPeerConnection(); 
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer); 
            socket.emit('ghost-offer', offer);
            videoRequestBtn.innerText = "Kapat"; 
            videoRequestBtn.style.color = "#ef4444"; 
            isVideoActive = true;
        } catch (err) { alert("İzin yok!"); }
    } else { stopVideoStreams(); }
}

socket.on('ghost-offer', async (offer) => {
    if (confirm("Görüntü gelsin mi?")) {
        try {
            localStream = await navigator
            .mediaDevices.getUserMedia(
            { video: true, audio: true });
            videoPanel.classList.remove('hidden'); 
            document.getElementById('localVideo')
            .srcObject = localStream;
            createPeerConnection(); 
            await peerConnection
            .setRemoteDescription(new 
            RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer(); 
            await peerConnection.setLocalDescription(answer);
            socket.emit('ghost-answer', answer); 
            videoRequestBtn.innerText = "Kapat"; 
            videoRequestBtn.style.color = "#ef4444"; 
            isVideoActive = true;
        } catch (err) { console.error(err); }
    }
});

socket.on('ghost-answer', async (answer) => { 
    if (peerConnection) await peerConnection
    .setRemoteDescription(new 
    RTCSessionDescription(answer)); 
});

socket.on('ghost-ice', async (candidate) => { 
    if (peerConnection) { 
        try { await peerConnection
            .addIceCandidate(new 
            RTCIceCandidate(candidate)); 
        } catch(e) {} 
    } 
});

function stopVideoStreams() {
    if (localStream) localStream.getTracks()
    .forEach(track => track.stop());
    if (peerConnection) peerConnection.close(); 
    videoPanel.classList.add('hidden');
    videoRequestBtn.innerText = "Görüntülü Görüşme"; 
    videoRequestBtn.style.color = "#000000"; 
    isVideoActive = false;
}

socket.on('start-msg-destruction', (data) => {
    const timerElement = 
    document.getElementById("timer-" + data.id);
    if (timerElement) { 
        timerElement.style.color = "#ef4444"; 
        timerElement.innerText = "30s"; 
    }
    startCountdownTimer(data.id, data.text);
});

function startCountdownTimer(msgId, txt) {
    let timeLeft = 30;
    const interval = setInterval(() => {
        timeLeft--; 
        const el = document.getElementById("timer-" + msgId); 
        if(el) el.innerText = timeLeft + "s";
        if(timeLeft <= 0) { 
            clearInterval(interval); 
            triggerCloudDestruction(msgId, txt); 
        }
    }, 1000);
}

function triggerCloudDestruction(messageId, fullText) {
    const txtEl = document.getElementById("text-" + messageId); 
    const cardEl = document.getElementById("msg-" + messageId);
    if(!txtEl || !cardEl) return; 
    
    cloudHeader.classList.add('lightning-active');
    setTimeout(() => cloudHeader
    .classList.remove('lightning-active'), 400);
    
    const cloudRect = cloudIcon.getBoundingClientRect(); 
    const textRect = txtEl.getBoundingClientRect();
    const targetX = (cloudRect.left + 
    (cloudRect.width / 2)) - textRect.left; 
    const targetY = (cloudRect.top + 
    (cloudRect.height / 2)) - textRect.top;
    
    const letters = fullText.split(''); 
    txtEl.innerHTML = '';
    letters.forEach((char, i) => {
        const span = document.createElement('span'); 
        span.innerText = char === ' ' ? '\u00A0' : char;
        span.className = 'fly-animation'; 
        span.style.setProperty('--target-x', `${targetX}px`);
        span.style.setProperty('--target-y', `${targetY}px`); 
        span.style.animationDelay = (i * 0.05) + "s"; 
        txtEl.appendChild(span);
    });
    
    const timerEl = 
    document.getElementById("timer-" + messageId); 
    if(timerEl) timerEl.remove();
    
    setTimeout(() => {
        cardEl.remove();
        for (let i = 0; i < fullText.length; i++) {
            setTimeout(() => {
                const drop = 
                document.createElement('div'); 
                drop.innerText = '💧'; 
                drop.className = 'destruction-drop';
                drop.style.left = (Math.random()*95)+"%"; 
                drop.style.top = "0px"; 
                messagesDiv.appendChild(drop);
                setTimeout(() => drop.remove(), 1300);
            }, i * 35);
        }
    }, 2400);
}

function triggerPremiumLockout(reasonMessage) {
    stopVideoStreams();
    if (callTimerInterval) clearInterval(callTimerInterval);
    messageInput.disabled = true;
    document.getElementById('sendMsgBtn').disabled = true;
    videoRequestBtn.disabled = true;
    alert("⚠️ KOTA LİMİTİ\n\n" + reasonMessage + 
    "\n\nSınırsız erişim için Premium Paket alın.");
    appendSystemMessage("[KİLİTLENDİ]: Ücretsiz kota doldu.");
}

function appendSystemMessage(text) {
    const html = `<div style="color: rgba(34, 197, 94, 0.5); 
    font-style: italic; margin-bottom: 25px; 
    font-size: 13px;">${text}</div>`;
    messagesDiv.insertAdjacentHTML('beforeend', html);
}

socket.on('ghost-incoming', (data) => { 
    isIncomingCallWaiting = true; targetNick = data.from; 
});
startGlobalRain = startIntroRain;
startGlobalRain();
</script>
